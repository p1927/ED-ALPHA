<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ED-ALPHA Demo Video</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #101828;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .frame {
      width: 100vw;
      height: 100vh;
      border: 0;
      background: #fff;
    }

    .fallback {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 32px;
      color: #fff;
      text-align: center;
    }

    .fallback-card {
      max-width: 720px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      padding: 28px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
    }

    .fallback h1 {
      margin: 0 0 12px;
      font-size: 32px;
      line-height: 1.1;
    }

    .fallback p {
      margin: 0;
      color: rgba(255, 255, 255, 0.78);
      font-size: 16px;
      line-height: 1.6;
    }

    code {
      color: #fff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <iframe class="frame" id="demo-frame" title="ED-ALPHA timed demo video"></iframe>
  <div class="fallback" id="fallback" hidden>
    <div class="fallback-card">
      <h1>ED-ALPHA Demo Video</h1>
      <p>
        This HTML wrapper loads the real ED-ALPHA dashboard tutorial route so the UI placement stays identical
        to the original app. Start the app with <code>pnpm dev</code>, then open
        <code>http://localhost:3000/walkthrough</code> or reload this wrapper.
      </p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const appUrl = params.get("app") || "http://localhost:3000/walkthrough";
    const passthrough = new URL(appUrl, window.location.href);

    for (const key of ["t", "paused", "speed", "audio"]) {
      if (params.has(key)) {
        passthrough.searchParams.set(key, params.get(key));
      }
    }

    const frame = document.getElementById("demo-frame");
    const fallback = document.getElementById("fallback");
    frame.src = passthrough.toString();

    window.setTimeout(() => {
      try {
        const loaded = frame.contentWindow && frame.contentDocument && frame.contentDocument.body.children.length > 0;
        if (!loaded) {
          fallback.hidden = false;
        }
      } catch (_error) {
        // Cross-origin iframe access is expected when loading localhost from file://.
      }
    }, 1800);
  </script>
</body>
</html>
